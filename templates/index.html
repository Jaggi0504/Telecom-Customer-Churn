<!DOCTYPE html>
<html>
  <head>
    <title>Customer Churn Prediction</title>
    <style>
      body {
        background-color: #f0f4f8;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background-color: #ffffff;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        max-width: 600px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
      }

      h2 {
        text-align: center;
        color: #333333;
      }

      form {
        display: flex;
        flex-direction: column;
      }

      label {
        margin-top: 10px;
        margin-bottom: 5px;
        color: #555555;
        font-weight: bold;
      }

      select,
      input {
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #cccccc;
        font-size: 14px;
        width: 100%;
      }

      button {
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #007bff;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background-color: #0056b3;
      }

      .footer {
        margin-top: 15px;
        text-align: center;
        color: #888888;
        font-size: 12px;
      }

      .prediction {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
      }

      .churn-yes {
        background-color: #ffcccc;
        color: #b30000;
      }

      .churn-no {
        background-color: #ccffcc;
        color: #006600;
      }

      @media (max-width: 500px) {
        .container {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <h2>Customer Churn Prediction</h2>

        <form action="/predict" method="post">
          <!-- form fields (same as before) -->
          <label>Gender:</label>
          <select name="gender">
            <option>Male</option>
            <option>Female</option>
          </select>

          <label>Senior Citizen:</label>
          <select name="SeniorCitizen">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Partner:</label>
          <select name="Partner">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Dependents:</label>
          <select name="Dependents">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Phone Service:</label>
          <select name="PhoneService">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Multiple Lines:</label>
          <select name="MultipleLines">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Online Security:</label>
          <select name="OnlineSecurity">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Online Backup:</label>
          <select name="OnlineBackup">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Device Protection:</label>
          <select name="DeviceProtection">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Tech Support:</label>
          <select name="TechSupport">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Streaming TV:</label>
          <select name="StreamingTV">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Streaming Movies:</label>
          <select name="StreamingMovies">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Paperless Billing:</label>
          <select name="PaperlessBilling">
            <option>True</option>
            <option>False</option>
          </select>

          <label>Tenure:</label>
          <input type="number" name="tenure" required />

          <label>Monthly Charges:</label>
          <input type="number" step="0.01" name="MonthlyCharges" required />

          <label>Total Charges:</label>
          <input type="number" step="0.01" name="TotalCharges" required />

          <label>Internet Service:</label>
          <select name="InternetService">
            <option>DSL</option>
            <option>Fiber optic</option>
            <option>No</option>
          </select>

          <label>Contract:</label>
          <select name="Contract">
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
          </select>

          <label>Payment Method:</label>
          <select name="PaymentMethod">
            <option>Bank transfer</option>
            <option>Credit card</option>
            <option>Electronic check</option>
            <option>Mailed check</option>
          </select>

          <button type="submit">Predict</button>
        </form>

        <!-- Prediction result -->
        {% if prediction is defined %}
        <div
          class="prediction {% if prediction == 1 %}churn-yes{% else %}churn-no{% endif %}"
        >
          {% if prediction == 1 %} Churn: Yes {% else %} Churn: No {% endif %}
        </div>
        {% endif %}

        <div class="footer">Powered by XGBoost & FastAPI</div>
      </div>
    </div>
  </body>
</html>
